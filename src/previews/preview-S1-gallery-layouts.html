<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLAP! — Gallery Icon Styles (6 Variations)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,900&family=Patrick+Hand&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0a; color: #fafafa;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ═══ CONTROLS ═══ */
.controls {
  position: sticky; top: 0; z-index: 1000;
  background: #1A1A2E; padding: 10px 24px;
  display: flex; gap: 16px; align-items: center;
  flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1);
}
.controls label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #B0B0CC; margin-right: 4px; }
.pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
.pill-btn {
  font-family: 'Courier New', monospace; font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 999px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #F5F0E1;
  transition: all 0.15s;
}
.pill-btn.active { background: #FFD000; color: #1A1A2E; border-color: #FFD000; }
.pill-btn:hover:not(.active) { border-color: #FFD000; }

/* ═══ LENS THEMES ═══ */
[data-lens="editorial"] {
  --bg: #faf8f4; --text: #1a1a1a; --text-dim: rgba(26,26,26,0.45);
  --accent: #e85d75; --accent2: #c8a960; --card-bg: #ffffff;
  --border: rgba(26,26,26,0.12); --font-h: 'Playfair Display', Georgia, serif;
  --font-b: 'Inter', sans-serif; --hw: 900; --hs: italic; --bw: 400;
  --radius: 0; --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --icon-color: #e85d75; --icon-dim: rgba(232,93,117,0.3);
}
[data-lens="brutalist"] {
  --bg: #ffffff; --text: #000000; --text-dim: rgba(0,0,0,0.5);
  --accent: #ff0000; --accent2: #ff0000; --card-bg: #ffffff;
  --border: #000000; --font-h: system-ui, -apple-system, sans-serif;
  --font-b: system-ui, sans-serif; --hw: 900; --hs: normal; --bw: 400;
  --radius: 0; --shadow: none;
  --icon-color: #ff0000; --icon-dim: rgba(255,0,0,0.3);
}
[data-lens="minimal"] {
  --bg: #fafafa; --text: #1a1a1a; --text-dim: #888888;
  --accent: #888888; --accent2: #aaaaaa; --card-bg: #ffffff;
  --border: #dddddd; --font-h: 'Inter', sans-serif;
  --font-b: 'Inter', sans-serif; --hw: 300; --hs: normal; --bw: 300;
  --radius: 0; --shadow: none;
  --icon-color: #888888; --icon-dim: rgba(136,136,136,0.3);
}
[data-lens="chalkboard"] {
  --bg: #2d4a3e; --text: #e8dcc8; --text-dim: rgba(232,220,200,0.5);
  --accent: #ffd93d; --accent2: #ff6b9d; --card-bg: rgba(255,255,255,0.05);
  --border: rgba(232,220,200,0.25); --font-h: 'Patrick Hand', cursive;
  --font-b: 'Nunito', sans-serif; --hw: 400; --hs: normal; --bw: 400;
  --radius: 6px; --shadow: none;
  --icon-color: #ffd93d; --icon-dim: rgba(255,217,61,0.3);
}
[data-lens="neutral"] {
  --bg: #0a0a0a; --text: #fafafa; --text-dim: rgba(250,250,250,0.55);
  --accent: #ffd700; --accent2: #e6c200; --card-bg: #141414;
  --border: rgba(255,255,255,0.1); --font-h: 'Inter', sans-serif;
  --font-b: 'Inter', sans-serif; --hw: 700; --hs: normal; --bw: 400;
  --radius: 6px; --shadow: 0 2px 16px rgba(0,0,0,0.4);
  --icon-color: #ffd700; --icon-dim: rgba(255,215,0,0.3);
}

/* ═══ GALLERY PAGE ═══ */
.gallery-page {
  background: var(--bg); color: var(--text);
  min-height: calc(100vh - 42px);
  display: flex; align-items: center; justify-content: center;
  padding: 48px 32px;
  transition: background 0.4s, color 0.4s;
}

/* ═══ 4x2 GRID ═══ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 20px;
  width: 100%;
  max-width: 1100px;
}

/* ═══ CARD ═══ */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 20px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  cursor: pointer; position: relative; overflow: hidden;
  height: 220px;
  justify-content: center;
  transition: transform 500ms cubic-bezier(0.25, 0.46, 0.45, 0.94),
              box-shadow 400ms ease, border-color 300ms ease;
  transform-style: preserve-3d;
  perspective: 600px;
}
.card__primary {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  transition: transform 400ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
  z-index: 1;
}
.card__name {
  font-family: var(--font-h); font-weight: var(--hw); font-style: var(--hs);
  font-size: 1.05rem;
}
.card__reveal {
  position: absolute;
  bottom: 24px; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  opacity: 0; transform: translateY(10px);
  transition: opacity 350ms ease 100ms, transform 350ms cubic-bezier(0.25, 0.46, 0.45, 0.94) 100ms;
  z-index: 1;
}
.card__desc {
  font-family: var(--font-b); font-weight: var(--bw);
  font-size: 0.72rem; color: var(--text-dim); line-height: 1.4;
  max-width: 190px;
}
.card__cta {
  font-family: 'Courier New', monospace;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent);
}
.card__accent {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: var(--accent); transform: scaleX(0);
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  transform-origin: left;
}

/* HOVER */
.card:hover {
  transform: perspective(600px) rotateX(-8deg) translateY(-6px);
  box-shadow: 0 24px 48px rgba(0,0,0,0.2);
  border-color: var(--accent);
}
.card:hover .card__primary { transform: translateY(-16px); }
.card:hover .card__reveal { opacity: 1; transform: translateY(0); }
.card:hover .card__accent { transform: scaleX(1); }

/* ═══ LENS DECORATIVES ═══ */
[data-lens="editorial"] .card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--accent); opacity: 0; transition: opacity 0.3s;
}
[data-lens="editorial"] .card:hover::before { opacity: 1; }
[data-lens="brutalist"] .card { border-width: 3px; border-color: #000; }
[data-lens="brutalist"] .card__name { text-transform: uppercase; letter-spacing: -0.02em; }
[data-lens="chalkboard"] .card::after {
  content: ''; position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px; opacity: 0.08; pointer-events: none;
  mix-blend-mode: overlay; border-radius: var(--radius);
}
[data-lens="chalkboard"] .card { border-style: dashed; }
[data-lens="minimal"] .card { border-color: transparent; }
[data-lens="minimal"] .card:hover { border-color: #ddd; }
[data-lens="minimal"] .card__name { letter-spacing: 0.04em; }

/* ═══════════════════════════════════════════════════════════
   ICON STYLES — A through F
   Only one visible at a time, controlled by [data-icons]
   ═══════════════════════════════════════════════════════════ */

.card__icon { display: none; }
.card__icon--active { display: flex; }

/* ─── A: MINI-WIREFRAMES (CSS box layouts) ─── */
.icon-wireframe {
  width: 48px; height: 40px; position: relative;
  border: 1.5px solid var(--icon-color); border-radius: 2px;
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.card:hover .icon-wireframe { transform: scale(1.15); }

.icon-wireframe .wf-bar {
  height: 6px; background: var(--icon-color); border-bottom: 1px solid var(--card-bg);
}
.icon-wireframe .wf-row {
  display: flex; flex: 1;
}
.icon-wireframe .wf-col {
  flex: 1; border-right: 1px solid var(--icon-dim);
}
.icon-wireframe .wf-col:last-child { border-right: none; }
.icon-wireframe .wf-block {
  margin: 2px; height: 6px; background: var(--icon-dim); border-radius: 1px;
}
.icon-wireframe .wf-sidebar {
  width: 12px; border-right: 1px solid var(--icon-dim);
  display: flex; flex-direction: column; gap: 2px; padding: 2px;
}
.icon-wireframe .wf-dot {
  width: 100%; height: 2px; background: var(--icon-dim); border-radius: 1px;
}
.icon-wireframe .wf-main { flex: 1; }
.icon-wireframe .wf-hero {
  height: 14px; background: var(--icon-dim); margin: 2px;
}
.icon-wireframe .wf-btn {
  width: 16px; height: 5px; background: var(--icon-color);
  border-radius: 1px; margin: 2px auto;
}
.icon-wireframe .wf-lines {
  display: flex; flex-direction: column; gap: 2px; padding: 2px;
}
.icon-wireframe .wf-line {
  height: 2px; background: var(--icon-dim); border-radius: 1px;
}
.icon-wireframe .wf-line.short { width: 70%; }
.icon-wireframe .wf-grid-2x2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
  flex: 1; padding: 2px;
}
.icon-wireframe .wf-grid-cell {
  background: var(--icon-dim); border-radius: 1px;
}
.icon-wireframe .wf-input {
  height: 5px; border: 1px solid var(--icon-dim); margin: 2px 3px;
  border-radius: 1px;
}
.icon-wireframe .wf-kanban {
  display: flex; flex: 1; gap: 1px; padding: 2px;
}
.icon-wireframe .wf-kanban-col {
  flex: 1; display: flex; flex-direction: column; gap: 1px;
}
.icon-wireframe .wf-kanban-card {
  height: 5px; background: var(--icon-dim); border-radius: 1px;
}
.icon-wireframe .wf-kanban-card.accent { background: var(--icon-color); }
.icon-wireframe .wf-bubbles {
  display: flex; flex-direction: column; gap: 3px; padding: 4px;
  flex: 1; justify-content: flex-end;
}
.icon-wireframe .wf-bubble {
  height: 4px; border-radius: 2px; background: var(--icon-dim);
}
.icon-wireframe .wf-bubble.left { width: 65%; align-self: flex-start; }
.icon-wireframe .wf-bubble.right { width: 50%; align-self: flex-end; background: var(--icon-color); }

/* ─── B: MONOGRAM (large letter, decorative) ─── */
.icon-monogram {
  font-family: 'Courier New', monospace;
  font-size: 2.2rem; font-weight: 900; line-height: 1;
  color: var(--icon-color);
  position: relative;
  transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.card:hover .icon-monogram { transform: scale(1.15); }
.icon-monogram::after {
  content: '';
  position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 2px; background: var(--icon-color); opacity: 0.4;
}

/* ─── C: GEOMETRIC ABSTRACTION (SVG shapes) ─── */
.icon-geo {
  width: 44px; height: 44px;
  transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.card:hover .icon-geo { transform: scale(1.15) rotate(5deg); }
.icon-geo svg { width: 100%; height: 100%; }

/* ─── D: LINE GLYPH (single-stroke SVG icons, hand-drawn feel) ─── */
.icon-glyph {
  width: 40px; height: 40px;
  transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.card:hover .icon-glyph { transform: scale(1.15); }
.icon-glyph svg {
  width: 100%; height: 100%;
  stroke: var(--icon-color); stroke-width: 1.5;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
}

@media (max-width: 900px) {
  .card-grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); }
}
@media (max-width: 500px) {
  .card-grid { grid-template-columns: 1fr; grid-template-rows: auto; }
  .gallery-page { padding: 24px 16px; }
  .card { height: auto; min-height: 180px; }
}
</style>
</head>
<body>

<div class="controls">
  <div>
    <label>Lens</label>
    <div class="pill-group" id="lens-pills">
      <button class="pill-btn active" data-val="editorial">Editorial</button>
      <button class="pill-btn" data-val="brutalist">Brutalist</button>
      <button class="pill-btn" data-val="minimal">Minimal</button>
      <button class="pill-btn" data-val="chalkboard">Chalkboard</button>
      <button class="pill-btn" data-val="neutral">Neutral</button>
    </div>
  </div>
  <div>
    <label>Icon Style</label>
    <div class="pill-group" id="icon-pills">
      <button class="pill-btn active" data-val="wireframe">A: Wireframe</button>
      <button class="pill-btn" data-val="monogram">B: Monogram</button>
      <button class="pill-btn" data-val="geo">C: Geometric</button>
      <button class="pill-btn" data-val="glyph">D: Line Glyph</button>
    </div>
  </div>
</div>

<div id="gallery" data-lens="editorial">
  <div class="gallery-page">
    <div class="card-grid" id="card-grid"></div>
  </div>
</div>

<script>
(function() {
  const archetypes = [
    { name: 'Landing Page', desc: 'Hero sections, pricing tables, testimonials & CTAs', mono: 'L' },
    { name: 'Text Heavy', desc: 'Long-form content with TOC, search & collapsible sections', mono: 'T' },
    { name: 'E-Commerce', desc: 'Product grid, cart drawer & checkout flow', mono: '$' },
    { name: 'Data Dashboard', desc: 'Metrics, charts, filters & sortable data tables', mono: 'D' },
    { name: 'Form Heavy', desc: 'Multi-step forms with validation & conditional fields', mono: 'F' },
    { name: 'Task Mgmt', desc: 'Kanban board with drag-and-drop & task modals', mono: 'K' },
    { name: 'Media Gallery', desc: 'Grid/list views, lightbox, filters & lazy loading', mono: 'G' },
    { name: 'Real-Time', desc: 'Chat interface with simulated messages & channels', mono: 'R' },
  ];

  // ─── A: WIREFRAME icons (CSS boxes) ───
  const wireframes = [
    // Landing: hero bar + button
    `<div class="wf-bar"></div><div class="wf-main"><div class="wf-hero"></div><div class="wf-btn"></div></div>`,
    // Text: sidebar + lines
    `<div class="wf-row" style="flex:1"><div class="wf-sidebar"><div class="wf-dot"></div><div class="wf-dot"></div><div class="wf-dot"></div></div><div class="wf-lines" style="flex:1"><div class="wf-line"></div><div class="wf-line short"></div><div class="wf-line"></div><div class="wf-line short"></div></div></div>`,
    // E-Commerce: bar + 2x2 grid
    `<div class="wf-bar"></div><div class="wf-grid-2x2"><div class="wf-grid-cell"></div><div class="wf-grid-cell"></div><div class="wf-grid-cell"></div><div class="wf-grid-cell"></div></div>`,
    // Dashboard: bar + metric tiles
    `<div class="wf-row" style="height:10px;gap:1px;padding:1px"><div class="wf-col" style="background:var(--icon-dim)"></div><div class="wf-col" style="background:var(--icon-dim)"></div><div class="wf-col" style="background:var(--icon-color)"></div></div><div class="wf-row" style="flex:1"><div class="wf-col" style="padding:2px"><div class="wf-line"></div><div class="wf-line short"></div></div><div class="wf-col" style="padding:2px"><div class="wf-grid-cell" style="height:100%;background:var(--icon-dim)"></div></div></div>`,
    // Form: stacked inputs + button
    `<div style="flex:1;display:flex;flex-direction:column;justify-content:center"><div class="wf-input"></div><div class="wf-input"></div><div class="wf-input"></div><div class="wf-btn" style="margin-top:3px"></div></div>`,
    // Kanban: columns with cards
    `<div class="wf-bar" style="height:4px"></div><div class="wf-kanban"><div class="wf-kanban-col"><div class="wf-kanban-card accent"></div><div class="wf-kanban-card"></div></div><div class="wf-kanban-col"><div class="wf-kanban-card"></div><div class="wf-kanban-card accent"></div><div class="wf-kanban-card"></div></div><div class="wf-kanban-col"><div class="wf-kanban-card"></div></div></div>`,
    // Media Gallery: 2x2 image grid
    `<div class="wf-grid-2x2" style="flex:1"><div class="wf-grid-cell" style="background:var(--icon-color);opacity:0.6"></div><div class="wf-grid-cell"></div><div class="wf-grid-cell"></div><div class="wf-grid-cell" style="background:var(--icon-color);opacity:0.6"></div></div>`,
    // Real-Time: chat bubbles
    `<div class="wf-bar" style="height:4px"></div><div class="wf-bubbles"><div class="wf-bubble left"></div><div class="wf-bubble right"></div><div class="wf-bubble left" style="width:45%"></div><div class="wf-bubble right" style="width:60%"></div></div>`,
  ];

  // ─── C: GEOMETRIC SVGs ───
  const geoSVGs = [
    // Landing: triangle + circle (launch)
    `<svg viewBox="0 0 44 44"><polygon points="22,4 40,36 4,36" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="22" cy="24" r="5" fill="currentColor" opacity="0.3"/></svg>`,
    // Text: stacked horizontal lines, offset
    `<svg viewBox="0 0 44 44"><line x1="6" y1="10" x2="38" y2="10" stroke="currentColor" stroke-width="2"/><line x1="10" y1="18" x2="34" y2="18" stroke="currentColor" stroke-width="1.5" opacity="0.5"/><line x1="6" y1="26" x2="38" y2="26" stroke="currentColor" stroke-width="2"/><line x1="10" y1="34" x2="30" y2="34" stroke="currentColor" stroke-width="1.5" opacity="0.5"/></svg>`,
    // E-Commerce: diamond (price tag)
    `<svg viewBox="0 0 44 44"><rect x="10" y="10" width="24" height="24" rx="2" transform="rotate(45 22 22)" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="22" cy="22" r="3" fill="currentColor"/></svg>`,
    // Dashboard: concentric squares
    `<svg viewBox="0 0 44 44"><rect x="4" y="4" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/><rect x="10" y="10" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="16" y="16" width="12" height="12" fill="currentColor" opacity="0.3"/></svg>`,
    // Form: checkbox + lines
    `<svg viewBox="0 0 44 44"><rect x="6" y="8" width="10" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><polyline points="8,13 11,16 15,10" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="22" y1="13" x2="38" y2="13" stroke="currentColor" stroke-width="1.5" opacity="0.5"/><rect x="6" y="24" width="10" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="22" y1="29" x2="34" y2="29" stroke="currentColor" stroke-width="1.5" opacity="0.5"/></svg>`,
    // Kanban: three vertical bars, staggered
    `<svg viewBox="0 0 44 44"><rect x="4" y="6" width="10" height="32" rx="2" fill="currentColor" opacity="0.2"/><rect x="17" y="12" width="10" height="26" rx="2" fill="currentColor" opacity="0.4"/><rect x="30" y="18" width="10" height="20" rx="2" fill="currentColor" opacity="0.6"/></svg>`,
    // Gallery: overlapping rectangles
    `<svg viewBox="0 0 44 44"><rect x="4" y="8" width="22" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="18" y="20" width="22" height="16" rx="1" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.5"/></svg>`,
    // Chat: overlapping circles
    `<svg viewBox="0 0 44 44"><circle cx="16" cy="22" r="12" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="28" cy="22" r="12" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"/></svg>`,
  ];

  // ─── D: LINE GLYPH SVGs (hand-drawn style) ───
  const glyphSVGs = [
    // Landing: flag/banner
    `<svg viewBox="0 0 40 40"><path d="M10 6 L10 34" /><path d="M10 6 L30 6 L26 13 L30 20 L10 20" /><circle cx="10" cy="34" r="1.5" fill="currentColor" stroke="none"/></svg>`,
    // Text: open book
    `<svg viewBox="0 0 40 40"><path d="M20 10 C15 8 8 8 4 12 L4 32 C8 28 15 28 20 30" /><path d="M20 10 C25 8 32 8 36 12 L36 32 C32 28 25 28 20 30" /><path d="M20 10 L20 30" /></svg>`,
    // E-Commerce: price tag
    `<svg viewBox="0 0 40 40"><path d="M6 20 L18 6 L34 6 L34 22 L20 34 Z" /><circle cx="28" cy="12" r="2.5" /></svg>`,
    // Dashboard: bar chart with trend line
    `<svg viewBox="0 0 40 40"><rect x="6" y="24" width="6" height="10" rx="1" fill="currentColor" opacity="0.2" stroke="none"/><rect x="17" y="16" width="6" height="18" rx="1" fill="currentColor" opacity="0.2" stroke="none"/><rect x="28" y="10" width="6" height="24" rx="1" fill="currentColor" opacity="0.2" stroke="none"/><path d="M8 22 L20 14 L31 8" /></svg>`,
    // Form: clipboard
    `<svg viewBox="0 0 40 40"><rect x="8" y="8" width="24" height="28" rx="2" /><rect x="14" y="5" width="12" height="6" rx="2" /><line x1="14" y1="20" x2="26" y2="20" /><line x1="14" y1="26" x2="22" y2="26" /></svg>`,
    // Kanban: three columns with cards
    `<svg viewBox="0 0 40 40"><line x1="14" y1="6" x2="14" y2="34" /><line x1="26" y1="6" x2="26" y2="34" /><rect x="4" y="10" width="8" height="5" rx="1" /><rect x="4" y="18" width="8" height="5" rx="1" /><rect x="16" y="10" width="8" height="5" rx="1" /><rect x="28" y="10" width="8" height="5" rx="1" /><rect x="28" y="18" width="8" height="5" rx="1" /></svg>`,
    // Gallery: viewfinder/frame
    `<svg viewBox="0 0 40 40"><rect x="6" y="10" width="28" height="20" rx="2" /><circle cx="20" cy="20" r="6" /><circle cx="20" cy="20" r="2" /><line x1="6" y1="10" x2="12" y2="16" opacity="0.4" /><line x1="34" y1="10" x2="28" y2="16" opacity="0.4" /></svg>`,
    // Chat: speech bubble
    `<svg viewBox="0 0 40 40"><path d="M6 8 L34 8 C34 8 36 8 36 10 L36 26 C36 28 34 28 34 28 L16 28 L10 34 L10 28 L6 28 C4 28 4 26 4 26 L4 10 C4 8 6 8 6 8 Z" /><line x1="12" y1="15" x2="28" y2="15" opacity="0.4" /><line x1="12" y1="21" x2="24" y2="21" opacity="0.4" /></svg>`,
  ];

  let currentIconStyle = 'wireframe';

  function renderCards() {
    document.getElementById('card-grid').innerHTML = archetypes.map((a, i) => {
      // Build all icon variants (only active one shown)
      const icons = [
        // A: Wireframe
        `<div class="card__icon icon-wireframe ${currentIconStyle==='wireframe'?'card__icon--active':''}" data-icon="wireframe">${wireframes[i]}</div>`,
        // B: Monogram
        `<div class="card__icon icon-monogram ${currentIconStyle==='monogram'?'card__icon--active':''}" data-icon="monogram">${a.mono}</div>`,
        // C: Geometric
        `<div class="card__icon icon-geo ${currentIconStyle==='geo'?'card__icon--active':''}" data-icon="geo">${geoSVGs[i]}</div>`,
        // D: Line Glyph
        `<div class="card__icon icon-glyph ${currentIconStyle==='glyph'?'card__icon--active':''}" data-icon="glyph">${glyphSVGs[i]}</div>`,
      ].join('');

      return `<div class="card">
        <div class="card__primary">
          ${icons}
          <span class="card__name">${a.name}</span>
        </div>
        <div class="card__reveal">
          <span class="card__desc">${a.desc}</span>
          <span class="card__cta">Explore \u2192</span>
        </div>
        <span class="card__accent"></span>
      </div>`;
    }).join('');
  }

  renderCards();

  function setIconStyle(style) {
    currentIconStyle = style;
    document.querySelectorAll('.card__icon').forEach(el => {
      el.classList.toggle('card__icon--active', el.dataset.icon === style);
    });
  }

  // Lens switching
  document.getElementById('lens-pills').addEventListener('click', e => {
    const btn = e.target.closest('.pill-btn');
    if (!btn) return;
    document.querySelectorAll('#lens-pills .pill-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('gallery').setAttribute('data-lens', btn.dataset.val);
  });

  // Icon style switching
  document.getElementById('icon-pills').addEventListener('click', e => {
    const btn = e.target.closest('.pill-btn');
    if (!btn) return;
    document.querySelectorAll('#icon-pills .pill-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setIconStyle(btn.dataset.val);
  });
})();
</script>
</body>
</html>
